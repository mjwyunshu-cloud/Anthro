                                </div>
                                <div className="mt-auto border-t border-black/[0.08] pt-12 flex flex-col md:flex-row justify-between items-center space-y-8 md:space-y-0">
                                   <button onClick={handleStart} className="group flex items-center gap-10 hover:translate-x-4 transition-all duration-700 active:scale-95">
                                       <div className="text-sm md:text-base tracking-[0.7em] font-sans font-black uppercase border-b-2 border-black pb-3">INITIATE ARCHIVE</div>
                                       <div className="h-[2px] w-14 bg-black scale-x-50 group-hover:scale-x-125 transition-transform origin-left hidden md:block opacity-60"></div>
                                   </button>
                                   <div className="text-center md:text-right text-3xl md:text-5xl font-light tracking-[0.3em] italic text-[#1a1a1a] opacity-80 uppercase leading-none">地脉人烟</div>
                                </div>
                            </div>
                        )}

                        {step === 'quiz' && (
                            <div className="flex-1 flex flex-col animate-in fade-in duration-700 text-left">
                                <div className="flex justify-between items-center border-b border-black/[0.1] pb-6 mb-12">
                                    <button onClick={() => (currentQ > 0 ? setCurrentQ(currentQ - 1) : setStep('intro'))} className="text-[10px] md:text-[11px] font-sans tracking-[0.4em] text-[#1a1a1a]/50 hover:text-[#1a1a1a] transition-colors uppercase font-black">← UNDO</button>
                                    <div className="text-[10px] md:text-[11px] tracking-[0.7em] font-sans text-[#1a1a1a]/30 uppercase font-black font-bold">LOG_0{currentQ + 1}</div>
                                </div>
                                <div className="flex-1 flex flex-col md:flex-row gap-12 md:gap-24 items-start overflow-y-auto pr-2 custom-scrollbar no-scrollbar pb-12">
                                    <div className="w-full md:w-5/12 space-y-10 text-left">
                                        <div className="text-[11px] md:text-[12px] tracking-[0.6em] text-[#1a1a1a]/40 uppercase font-sans border-l-[3px] border-black/10 pl-8 font-black text-left">Field_Query</div>
                                        <h2 className="text-2xl md:text-4xl font-light leading-[1.6] text-[#1a1a1a] tracking-tighter">{questions[currentQ]?.question}</h2>
                                        {questions[currentQ]?.explanation && <div className="bg-black/[0.02] p-6 border-l-2 border-black/20 italic text-left"><p className="text-[12px] leading-relaxed text-stone-500 font-serif">注脚: {questions[currentQ].explanation}</p></div>}
                                        <div className="flex items-center gap-3 text-stone-400">
                                            <Icon name="book-open" size={14} />
                                            <p className="text-[9px] uppercase tracking-widest italic font-sans font-bold">点击文字读档解释，点击方框最终勾选</p>
                                        </div>
                                    </div>
                                    <div className="w-full md:w-7/12 space-y-4">
                                        {questions[currentQ]?.options.map((option, idx) => (
                                            <div key={`opt-${currentQ}-${idx}`} className="group">
                                                <div className={`w-full text-left p-6 transition-all duration-500 border-l-[4px] flex items-start gap-6 ${viewingIndex === idx ? 'border-black bg-black/[0.015]' : 'border-transparent bg-black/[0.005]'}`}>
                                                    <div 
                                                        onClick={(e) => toggleSelection(idx, e)} 
                                                        className={`w-6 h-6 border border-black flex items-center justify-center shrink-0 transition-colors cursor-pointer ${tempSelection.includes(idx) ? 'bg-black text-[#fdfcf9]' : 'bg-white'}`}
                                                    >
                                                        {tempSelection.includes(idx) && <Icon name="check" size={16} />}
                                                    </div>
                                                    <div className="flex-1 cursor-pointer" onClick={() => setViewingIndex(viewingIndex === idx ? null : idx)}>
                                                        <span className="text-sm md:text-xl leading-relaxed font-medium block">{option.text}</span>
                                                        {viewingIndex === idx && (
                                                            <div className="mt-4 pt-4 border-t border-black/5 animate-in slide-in-from-top-2 duration-300">
                                                                <p className="text-[#1a1a1a] italic leading-[2.4] text-sm md:text-lg font-serif opacity-80">“{option.theory}”</p>
                                                            </div>
                                                        )}
                                                    </div>
                                                </div>
                                            </div>
                                        ))}
                                        <div className="pt-10 flex items-center justify-between">
                                           <div className="text-[10px] font-sans tracking-[0.2em] text-stone-400 uppercase font-bold">已确认 {tempSelection.length} 个视点</div>
                                           <button onClick={nextQuestion} disabled={tempSelection.length === 0} className={`flex items-center gap-10 px-12 py-3.5 text-xs tracking-[0.6em] font-black uppercase transition-all ${tempSelection.length > 0 ? 'bg-black text-[#fdfcf9]' : 'bg-stone-100 text-stone-300'}`}>
                                               {currentQ < questions.length - 1 ? "NEXT_LOG" : "FINAL_REPORT"}
                                               <Icon name="arrow-right" size={20} className="ml-2" />
                                           </button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {step === 'result' && (
                            <div className="flex-1 animate-in fade-in duration-1000 overflow-y-auto no-scrollbar pb-32 pr-2 custom-scrollbar text-left">
                                
                                <div className="text-center space-y-12 mb-32 pt-16">
                                    <div className="text-[10px] tracking-[1.5em] text-black/30 uppercase font-black">ARCHETYPE ANALYSIS REPORT</div>
                                    <div className="relative inline-block py-10">
                                        <div className="text-6xl md:text-8xl font-black tracking-tighter text-[#1a1a1a] leading-none uppercase filter drop-shadow-sm">{resultID}</div>
                                        <div className="mt-8 text-[10px] tracking-[1.2em] text-black/50 uppercase font-bold">—— {persona.identity} ——</div>
                                    </div>
                                    <div className="flex justify-center gap-6 font-sans">
                                        <div className="px-6 py-2 border border-black/10 text-[9px] tracking-widest font-black uppercase">信任度 95.8%</div>
                                        <div className="px-6 py-2 bg-[#1a1a1a] text-white text-[9px] tracking-widest font-black uppercase">IDENTITY VALIDATED</div>
                                    </div>
                                </div>

                                <div className="grid grid-cols-1 md:grid-cols-2 gap-16 border-y border-black/[0.08] py-24 mb-40 text-left">
                                   <div className="text-left">
                                      <div className="text-[10px] tracking-[0.6em] text-black/30 uppercase font-black mb-12 border-l-4 border-black pl-6 text-left">叙事基因分析 / ARCHIVE</div>
                                      <StatBar label="感官灵敏" value={persona.traits[0]} />
                                      <StatBar label="理性逻辑" value={persona.traits[2]} />
                                      <StatBar label="情感共振" value={persona.traits[4]} />
                                      <StatBar label="前瞻思维" value={persona.traits[3]} />
                                   </div>
                                   <div className="flex flex-col items-center">
                                      <RadarChart data={persona.traits} />
                                      <div className="mt-8 text-[8px] tracking-[0.5em] uppercase text-black/20 font-black">Cognitive Geometry Mapping</div>
                                   </div>
                                </div>

                                <div className="max-w-4xl mx-auto space-y-32 mb-48 text-left">
                                   <section className="space-y-12 text-left">
                                      <div className="bg-black text-[#fdfcf9] px-5 py-1.5 text-[9px] tracking-widest font-black uppercase inline-block">精神解读报告 / THE SELF</div>
                                      <div className="space-y-20 text-left">
                                        <div className="text-left">
                                           <div className="text-[10px] text-black/30 tracking-[0.5em] uppercase font-black mb-8">文学原型定义 / ARCHETYPE IDENTITY</div>
                                           <p className="text-2xl md:text-4xl leading-[2.2] text-black/90 font-serif italic pr-0 md:pr-12 text-left">“{persona.desc}”</p>
                                        </div>
                                        <div className="max-w-3xl mx-auto md:ml-0 border-l-4 border-black/10 pl-10 text-left">
                                           <div className="text-[10px] text-black/30 tracking-[0.5em] uppercase font-black mb-6">叙事风格建议 / WRITING PROTOCOL</div>
                                           <p className="text-base md:text-lg leading-[2.4] text-black/60 font-serif italic">“{persona.selfReport}”</p>
                                        </div>
                                      </div>
                                   </section>

                                   <section className="border-t border-black/[0.06] pt-24 text-left">
                                      <div className="flex flex-col md:flex-row justify-between items-start gap-12 text-left">
                                        <div className="w-full md:w-2/3 text-left">
                                           <div className="text-[10px] text-black/30 tracking-[0.6em] uppercase font-black mb-8">深度逻辑分析 / INTERNAL LOGIC</div>
                                           <p className="text-xl md:text-2xl leading-[2.6] text-black/80 font-serif italic text-left">“{persona.analysis}”</p>
                                        </div>
                                        <div className="w-full md:w-1/3 p-10 bg-black/[0.015] border border-black/[0.03] text-center">
                                           <div className="text-[8px] font-black text-black/20 uppercase tracking-widest mb-4">Metadata Analysis</div>
                                           <div className="text-3xl font-black opacity-10 uppercase tracking-widest">Archive</div>
                                        </div>
                                      </div>
                                   </section>
                                </div>

                                <div className="grid grid-cols-1 md:grid-cols-2 gap-12 mb-48 px-4 text-left">
                                   <div className="border border-red-900/10 p-12 space-y-10 bg-red-50/[0.04] rounded-sm shadow-sm text-left">
                                      <div className="flex justify-between items-center border-b border-red-900/10 pb-6 text-left"><span className="text-[12px] tracking-widest font-black text-red-900/40 uppercase">阴影投射 / SHADOW</span></div>
                                      <div className="text-left"><div className="text-[10px] text-red-900/30 uppercase font-black mb-4 tracking-widest text-left">核心焦虑 / ANXIETY</div><p className="text-xl font-serif italic text-red-900/70 leading-relaxed text-left">“{persona.shadow}”</p></div>
                                   </div>
                                   <div className="border border-black/[0.08] p-12 space-y-10 bg-white shadow-sm rounded-sm text-left">
                                      <div className="flex justify-between items-center border-b border-black/[0.08] pb-6 text-left"><span className="text-[12px] tracking-widest font-black text-black/40 uppercase">检视与自洽 / ACCEPTANCE</span></div>
                                      <div className="text-left"><div className="text-[10px] text-black/30 uppercase font-black mb-4 tracking-widest text-left">调试情境 / SITUATION</div><p className="text-xl font-serif italic border-b border-black/10 pb-2 leading-relaxed text-left">“{persona.acceptance}”</p></div>
                                   </div>
                                </div>

                                <div className="bg-black/[0.02] p-16 md:p-24 border-y border-black/[0.1] mb-48 text-left">
                                   <div className="grid grid-cols-1 md:grid-cols-2 gap-20 text-left">
                                      <div className="space-y-12 text-left">
                                        <div className="text-[10px] tracking-[0.6em] font-black text-black/30 uppercase text-left">MATCHED MENTOR / 导师匹配</div>
                                        <div className="flex items-center gap-10 text-left">
                                          <div className="w-20 h-20 bg-black rounded-full flex items-center justify-center text-[#fdfcf9] font-black text-4xl shadow-xl">{persona.mentor[0]}</div>
                                          <div className="text-left"><div className="text-2xl font-black tracking-widest leading-none mb-2 text-left">{persona.mentor}</div><div className="text-[10px] font-sans text-black/40 uppercase tracking-widest">Founding Figure</div></div>
                                        </div>
                                        <blockquote className="text-xl italic font-serif leading-[2.4] border-l-4 border-black pl-10 text-left">“{persona.quote}”</blockquote>
                                        <div className="flex flex-wrap gap-4 text-left">{persona.keywords.map(k => <span key={k} className="text-[9px] font-black border border-black/25 px-4 py-1.5 uppercase tracking-widest bg-white shadow-sm">#{k}</span>)}</div>
                                      </div>
                                      <div className="text-left">
                                        <div className="text-[10px] tracking-[0.6em] font-black text-black/30 uppercase mb-12 text-left">TENSION SPECTRA / 认知光谱</div>
                                        <SpectrumBar left="大地起源" right="赛博未来" label="物理根基偏好" value={persona.spectrum[0]} />
                                        <SpectrumBar left="感性直觉" right="刚性结构" label="逻辑偏好" value={persona.spectrum[1]} />
                                        <SpectrumBar left="边缘个体" right="宏观系统" label="视角偏好" value={persona.spectrum[2]} />
                                      </div>
                                   </div>
                                </div>

                                <div className="max-w-4xl mx-auto space-y-16 mb-48 px-4 text-left">
                                   <div className="text-center font-sans"><span className="text-[12px] tracking-[1.2em] text-black/40 font-black uppercase">思想进阶书单推荐 / READINGS</span></div>
                                   <div className="space-y-6 text-left">
                                     {persona.books.map((b, i) => (
                                       <div key={b} className="border border-black/[0.08] p-10 flex justify-between items-center group hover:bg-black/[0.01] transition-all cursor-pointer bg-white shadow-sm rounded-sm text-left">
                                          <div className="flex items-center gap-12 text-left">
                                            <div className="text-2xl font-serif text-black/20 italic font-black">0{i+1}</div>
                                            <div className="text-left"><div className="text-2xl font-black mb-1 leading-none group-hover:underline decoration-1 underline-offset-8 text-left">《{b}》</div><p className="text-[10px] text-black/40 uppercase font-bold tracking-widest">Selected Anthropological Archive</p></div>
                                          </div>
                                          <div className="px-6 py-2 bg-black text-[#fdfcf9] text-[9px] font-black uppercase tracking-widest">Recommend</div>
                                       </div>
                                     ))}
                                   </div>
                                </div>

                                <div className="flex justify-center pt-24 border-t-4 border-[#1a1a1a] mb-20 text-center">
                                  <button onClick={handleStart} className="flex items-center gap-10 text-[#fdfcf9] bg-[#1a1a1a] transition-all font-sans font-black uppercase text-[14px] tracking-[1.5em] group active:scale-95 py-8 px-20 shadow-2xl">
                                    <Icon name="refresh-ccw" size={22} className="group-hover:rotate-180 transition-transform duration-1000 opacity-80" /> RE-SEARCH / 重记灵魂
                                  </button>
                                </div>

                                <div className="max-w-4xl mx-auto border-t border-black/[0.1] pt-16 text-left">
                                  <button onClick={() => setShowSchoolDossier(!showSchoolDossier)} className="w-full flex items-center justify-between group py-4 text-left">
                                    <div className="text-left">
                                        <div className="text-4xl font-black tracking-[0.25em] mb-4 uppercase leading-none text-left">Anthro Dossier</div>
                                        <div className="text-[11px] tracking-[0.5em] text-black/30 uppercase font-black border-l-2 border-black pl-4 text-left">人类学流派档案实验室 (点击阅读)</div>
                                    </div>
                                    {showSchoolDossier ? <Icon name="chevron-up" size={40} /> : <Icon name="chevron-down" size={40} />}
                                  </button>
                                  {showSchoolDossier && (
                                    <div className="mt-20 animate-in slide-in-from-top-10 duration-700 overflow-x-auto text-left">
                                      <table className="w-full text-[14px] text-left border-collapse font-serif leading-loose min-w-[800px]">
                                        <thead><tr className="border-b-2 border-black"><th className="py-8 font-black uppercase tracking-[0.2em]">学派</th><th className="py-8 font-black uppercase tracking-[0.2em]">主张</th><th className="py-8 font-black uppercase tracking-[0.2em]">代表</th><th className="py-8 font-black uppercase tracking-[0.2em]">批评</th></tr></thead>
                                        <tbody className="divide-y divide-black/[0.1]">
                                          {SCHOOLS.map((s, i) => (
                                            <tr key={`school-${i}`} className="group hover:bg-black/[0.01]"><td className="py-10 pr-6 font-black text-xl">{s.name}</td><td className="py-10 pr-10 italic opacity-85 text-lg leading-relaxed text-left">“{s.claim}”</td><td className="py-10 pr-10 font-medium text-black/70">{s.people}</td><td className="py-10 text-black/60 font-sans"><div className="leading-relaxed mb-6">{s.critique}</div><div className="pt-4 border-t border-black/[0.06] text-[10px] font-black uppercase text-black/35 tracking-wider italic"><span className="text-black/50 mr-2">关联:</span> {s.relation}</div></td></tr>
                                          ))}
                                        </tbody>
                                      </table>
                                    </div>
                                  )}
                                </div>
                            </div>
                        )}
                    </div>

                    <footer className="mt-16 text-[#1a1a1a]/30 text-[10px] tracking-[1em] uppercase text-center pb-24 opacity-50 font-black">ARCHÉ THOUGHT SHOP / FIELDWORK ARCHIVE © 2025</footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
