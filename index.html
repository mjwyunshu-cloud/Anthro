                                        <h2 className="text-6xl md:text-9xl font-black tracking-tight leading-none filter drop-shadow-sm uppercase">万物皆可<br/>人类学</h2>
                                        <div className="w-20 md:w-32 h-[1.5px] bg-black/30"></div>
                                        <p className="max-w-sm text-[13px] leading-[2.5] text-black/65 italic">勾选你认同的视角。这30个观测点将揭示你最底层的文明抓痕。请以肉身去读档。</p>
                                    </div>
                                </div>
                                <div className="mt-auto border-t border-black/[0.08] pt-12 flex flex-col md:flex-row justify-between items-center space-y-8 md:space-y-0">
                                   <button onClick={handleStart} className="group flex items-center gap-10 hover:translate-x-4 transition-all duration-700">
                                       <div className="text-sm md:text-base tracking-[0.7em] font-sans font-black uppercase border-b-2 border-black pb-3">INITIATE ARCHIVE</div>
                                   </button>
                                   <div className="text-center md:text-right text-3xl md:text-5xl font-light tracking-[0.3em] italic opacity-80 leading-none uppercase">地脉人烟</div>
                                </div>
                            </div>
                        )}

                        {step === 'quiz' && (
                            <div className="flex-1 flex flex-col animate-in text-left">
                                <div className="flex justify-between items-center border-b border-black/[0.1] pb-6 mb-8">
                                    <button onClick={() => (currentQ > 0 ? setCurrentQ(currentQ - 1) : setStep('intro'))} className="text-[10px] md:text-[11px] font-sans tracking-[0.4em] text-black/50 hover:text-black uppercase font-black">← UNDO</button>
                                    <div className="text-[10px] font-black uppercase tracking-[0.5em] text-black/30">QUERY_0{currentQ + 1} / 30</div>
                                </div>
                                <div className="flex-1 flex flex-col md:flex-row gap-8 items-start overflow-hidden">
                                    <div className="md:w-5/12 space-y-6 text-left">
                                        <div className="text-[10px] tracking-widest font-black uppercase text-black/40 border-l-2 border-black pl-4">Anthropology_Context</div>
                                        <h2 className="text-2xl md:text-4xl font-light leading-snug tracking-tighter">{questions[currentQ].question}</h2>
                                        <div className="flex items-center gap-3 text-black/30"><Icon name="layers" size={14} /><span className="text-[9px] uppercase font-bold tracking-widest">点击方框最终勾选，点击文字读档‘深描’。</span></div>
                                    </div>
                                    <div className="md:w-7/12 w-full space-y-3 overflow-y-auto pr-2 custom-scrollbar max-h-[60vh] md:max-h-full pb-10">
                                        {questions[currentQ].options.map((opt, idx) => (
                                            <div key={`q-${currentQ}-opt-${idx}`} className={`group p-4 border transition-all flex gap-4 items-start ${tempSelection.includes(idx) ? 'bg-black/[0.02] border-black' : 'bg-white border-black/5 hover:border-black/20'}`}>
                                                <div onClick={(e) => toggleSelection(idx, e)} className={`w-5 h-5 border flex items-center justify-center mt-1 shrink-0 cursor-pointer ${tempSelection.includes(idx) ? 'bg-black border-black text-white' : 'bg-white border-black'}`}>{tempSelection.includes(idx) && <Icon name="check" size={14} />}</div>
                                                <div className="flex-1 cursor-pointer" onClick={() => setViewingIndex(viewingIndex === idx ? null : idx)}>
                                                    <span className={`text-base md:text-lg leading-relaxed ${tempSelection.includes(idx) ? 'font-black' : 'font-medium'}`}>{opt.text}</span>
                                                    {viewingIndex === idx && <div className="mt-4 pt-4 border-t border-black/5 animate-in"><p className="text-[#1a1a1a] italic leading-[2.2] text-sm md:text-base font-serif opacity-70">“{opt.theory}”</p></div>}
                                                </div>
                                            </div>
                                        ))}
                                        <div className="pt-8 flex justify-between items-center">
                                            <div className="text-[10px] font-black opacity-20 uppercase tracking-widest">已确认为 {tempSelection.length} 个视点</div>
                                            <button onClick={nextQuestion} disabled={tempSelection.length === 0} className={`px-10 py-4 text-xs font-black uppercase tracking-[0.5em] flex items-center gap-4 transition-all ${tempSelection.length > 0 ? 'bg-black text-white' : 'bg-stone-100 text-stone-300'}`}>{currentQ === 29 ? "FINAL_ARCHIVE" : "CONTINUE"} <Icon name="arrow-right" size={16} /></button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {step === 'result' && (
                            <div className="flex-1 animate-in flex flex-col text-left overflow-y-auto pr-2 custom-scrollbar pb-24">
                                
                                {/* 顶部认领称呼板块 */}
                                <div className="text-center py-12 mb-10 animate-in px-4">
                                   <div className="text-[10px] font-sans font-black tracking-[1em] text-black/30 uppercase mb-8">ARCHETYPE ANALYSIS REPORT</div>
                                   <h2 className="text-6xl md:text-8xl font-black tracking-tighter mb-6">{persona.identity}</h2>
                                   <div className="text-[13px] font-sans font-black tracking-[0.6em] text-blue-900/40 uppercase mb-10">{persona.subtitle}</div>
                                   <div className="flex justify-center gap-6 font-sans">
                                        <div className="px-6 py-2 bg-[#1a1a1a] text-white text-[9px] tracking-widest font-black uppercase">IDENTITY VALIDATED</div>
                                   </div>
                                </div>

                                <div className="max-w-4xl mx-auto space-y-12 pb-24 px-4 md:px-0">
                                    {/* 精神解剖报告卡片 */}
                                    <div className="bg-white p-8 md:p-14 rounded-[3rem] card-shadow border border-black/[0.02] animate-in" style={{animationDelay: '0.2s'}}>
                                        <div className="text-[10px] font-sans font-black tracking-widest text-black/20 uppercase mb-12">田野人格界定 / THE SELF</div>
                                        
                                        <div className="mb-16">
                                            <div className="text-[9px] font-black uppercase tracking-[0.4em] opacity-30 mb-6">田野身份界定 / ARCHETYPE IDENTITY</div>
                                            <p className="text-3xl md:text-4xl leading-[2] font-serif italic text-black/90 font-bold">{persona.archetypeIdentity}</p>
                                        </div>
                                        
                                        <div className="mb-16">
                                            <div className="text-[9px] font-black uppercase tracking-[0.4em] opacity-30 mb-6">民族志姿态 / ETHNOGRAPHIC STANCE</div>
                                            <p className="text-xl md:text-2xl leading-[2.6] font-serif italic text-red-arche font-medium">{persona.ethnographicStance}</p>
                                        </div>

                                        <div className="mb-16">
                                            <div className="text-[9px] font-black uppercase tracking-[0.4em] opacity-30 mb-6">社会观察透镜 / OBSERVATION LENS</div>
                                            <p className="text-xl leading-[2.4] text-black/70 font-serif italic">{persona.analyticalLens}</p>
                                        </div>

                                        <div>
                                            <div className="text-[9px] font-black uppercase tracking-[0.4em] opacity-30 mb-6">田野实践路径 / PRAXIS PATH</div>
                                            <p className="text-xl md:text-2xl leading-[2.6] text-blue-arche font-serif italic font-bold">{persona.praxisPath}</p>
                                        </div>
                                    </div>

                                    {/* 灵魂分析卡片 */}
                                    <div className="bg-white p-8 md:p-14 rounded-[3rem] card-shadow border border-black/[0.02] animate-in" style={{animationDelay: '0.4s'}}>
                                        <div className="text-[10px] font-sans font-black tracking-widest text-black/20 uppercase mb-12">灵魂解构分析 / THE SOUL</div>
                                        
                                        <div className="mb-16">
                                            <div className="text-[9px] font-black uppercase tracking-[0.4em] opacity-30 mb-6">认知逻辑核心 / INTERNAL LOGIC</div>
                                            <p className="text-2xl md:text-3xl leading-[2.2] font-serif italic text-black/80 font-bold">{persona.internalLogic}</p>
                                        </div>

                                        <div className="mb-16">
                                            <div className="text-[9px] font-black uppercase tracking-[0.4em] opacity-30 mb-6">人格田野显影 / MANIFESTATION</div>
                                            <p className="text-xl md:text-2xl leading-[2.4] text-black/70 font-serif italic font-medium">{persona.manifestation}</p>
                                        </div>
                                        
                                        <div className="divider-dotted"></div>
                                        
                                        <div className="pt-8">
                                            <div className="flex items-center gap-8 mb-10 text-black/80">
                                                <div className="w-20 h-20 bg-black rounded-full flex items-center justify-center text-white text-4xl font-black shadow-xl">{persona.mentorName[0]}</div>
                                                <div>
                                                    <div className="text-[10px] font-black tracking-[0.5em] opacity-30 mb-2">导师深度重读 / DEEP DECODING</div>
                                                    <div className="text-2xl font-black uppercase tracking-widest">{persona.mentorName}</div>
                                                </div>
                                            </div>
                                            <p className="text-xl leading-[2.8] font-serif italic opacity-80 mb-12">{persona.mentorDeepDive}</p>
                                            <div className="quote-left italic opacity-50 text-lg py-4">“{persona.quote}”</div>
                                        </div>
                                    </div>

                                    {/* 核心焦虑与潜在阴影卡片 */}
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-10">
                                        <div className="bg-white p-10 md:p-14 rounded-[3rem] card-shadow border border-black/[0.02] animate-in" style={{animationDelay: '0.6s'}}>
                                            <div className="text-red-arche font-black uppercase tracking-[0.4em] mb-10 border-b border-red-arche/10 pb-4">核心焦虑 / ANXIETY</div>
                                            <p className="text-3xl leading-[1.8] text-red-arche font-serif italic mb-8 font-black">{persona.shadowTitle}</p>
                                            <p className="text-xl leading-[2.2] text-red-arche/70 font-serif italic">{persona.shadowText}</p>
                                        </div>
                                        <div className="bg-white p-10 md:p-14 rounded-[3rem] card-shadow border border-black/[0.02] animate-in" style={{animationDelay: '0.7s'}}>
                                            <div className="text-black font-black uppercase tracking-[0.4em] opacity-30 mb-10 border-b border-black/5 pb-4">潜在阴影 / SHADOW</div>
                                            <p className="text-xl leading-[2.4] text-black/60 font-serif italic mb-12">{persona.shadow}</p>
                                            <div className="space-y-6">
                                                <div className="text-[10px] font-black text-black/20 uppercase tracking-widest">思想书单推荐 / BIBLIOGRAPHY</div>
                                                {persona.books?.map((book, i) => (
                                                    <div key={i} className="flex items-center justify-between border-b border-black/[0.03] pb-4 group hover:bg-black/[0.01] transition-all cursor-pointer">
                                                        <span className="text-xl font-bold italic opacity-70 group-hover:opacity-100">《{book}》</span>
                                                        <Icon name="chevron-right" size={16} className="opacity-20 group-hover:translate-x-1 transition-all" />
                                                    </div>
                                                ))}
                                                <div className="flex flex-wrap gap-3 pt-8">
                                                    {persona.keywords?.map(k => <span key={k} className="text-[9px] font-black border border-black/10 px-5 py-2.5 uppercase tracking-widest text-black/30 hover:bg-black hover:text-white transition-all">#{k}</span>)}
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>

                                <div className="flex justify-center pb-24 mt-12 px-4">
                                    <button onClick={handleStart} className="w-full md:w-auto px-24 py-9 bg-black text-white text-[12px] font-black uppercase tracking-[1.5em] active:scale-95 transition-all shadow-2xl rounded-full text-center">RE-SEARCH / 重记灵魂</button>
                                </div>

                                <footer className="text-black/10 text-[10px] tracking-[1.5em] uppercase text-center pb-12 font-black">ARCHÉ THOUGHT SHOP / FIELDWORK ARCHIVE © 2025</footer>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
