                                        <h3 className="text-2xl font-black mb-10 text-red-900 border-b-2 border-red-900/30 inline-block pb-1 uppercase tracking-wider">认知暗面 / THE BLINDSPOT</h3>
                                        <div className="space-y-10">
                                            <p className="text-xl leading-[2.2] text-red-900/80 font-serif italic border-l-4 border-red-900/10 pl-8">“{persona.blindspot}”</p>
                                        </div>
                                    </section>

                                    <section className="animate-in bg-stone-900 text-stone-50 p-12 md:p-20 shadow-2xl relative overflow-hidden" style={{animationDelay: '0.6s'}}>
                                        <div className="absolute top-0 right-0 p-10 opacity-5"><Icon name="scroll-text" size={120} /></div>
                                        <div className="relative z-10">
                                            <div className="flex items-center gap-8 mb-12">
                                                <div className="w-20 h-20 bg-stone-50 rounded-full flex items-center justify-center text-stone-900 text-4xl font-black shadow-xl">{persona.mentorName[0]}</div>
                                                <div>
                                                    <div className="text-[11px] font-black uppercase tracking-[0.4em] opacity-50 mb-2">FIELDWORK MENTOR</div>
                                                    <div className="text-3xl font-black tracking-widest">{persona.mentorName}</div>
                                                </div>
                                            </div>
                                            <div className="text-[11px] font-black uppercase tracking-widest opacity-30 mb-6 border-b border-stone-700 pb-2">导师重读 / DEEP DECODING</div>
                                            <p className="text-lg md:text-xl leading-[2.8] font-serif italic mb-10 opacity-90">{persona.mentorDeepDive}</p>
                                            <div className="quote-left border-stone-50/20 italic opacity-60 text-lg">“{persona.quote}”</div>
                                        </div>
                                    </section>

                                    <section className="animate-in" style={{animationDelay: '0.8s'}}>
                                        <h3 className="text-2xl font-black mb-10 text-stone-900 border-b-2 border-black inline-block pb-1 uppercase tracking-wider">实践指南 / PRAXIS</h3>
                                        <div className="space-y-12">
                                            <div className="bg-stone-50 p-10 border border-stone-200 shadow-sm">
                                                <div className="text-[11px] font-black text-stone-400 uppercase tracking-widest mb-6">建议处方 / ACCEPTANCE</div>
                                                <p className="text-lg md:text-xl leading-[2.6] text-stone-700 font-serif italic">{persona.praxis}</p>
                                            </div>
                                            <div className="space-y-6 pt-6">
                                                <div className="text-[11px] font-black text-stone-400 uppercase tracking-widest">推荐读档 / BIBLIOGRAPHY</div>
                                                {persona.books.map((book, i) => (
                                                    <div key={i} className="flex items-center justify-between border-b border-stone-100 pb-4 group cursor-pointer hover:bg-stone-50 transition-all">
                                                        <span className="text-xl font-bold italic group-hover:pl-4 transition-all">《{book}》</span>
                                                        <span className="text-[9px] font-black text-stone-300 uppercase tracking-widest">Archive Log 0{i+1}</span>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    </section>

                                    <div className="flex justify-center pt-32 pb-20">
                                        <button onClick={handleStart} className="px-20 py-8 bg-stone-900 text-stone-50 text-[12px] font-black uppercase tracking-[1.2em] active:scale-95 transition-all shadow-2xl hover:bg-black">RE-SEARCH / 重记灵魂</button>
                                    </div>
                                </div>
                            </div>
                        )}
                        
                        <footer className="mt-8 text-black/20 text-[10px] tracking-[1em] uppercase text-center pb-4 font-black">ARCHÉ THOUGHT SHOP / FIELDWORK ARCHIVE © 2025</footer>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
